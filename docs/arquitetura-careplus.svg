<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">Arquitetura CarePlus Sprint 02</title>
  <desc id="desc">Diagrama em camadas da arquitetura CarePlus Sprint 02 com Application, Back-end FIWARE e Edge IoT.</desc>
  <defs>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6f3c96"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#214f84"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#18784f"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3a4652"/>
    </marker>
    <linearGradient id="appBand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf7ff"/>
      <stop offset="1" stop-color="#eadcf4"/>
    </linearGradient>
    <linearGradient id="edgeBand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fff9"/>
      <stop offset="1" stop-color="#e1f4d8"/>
    </linearGradient>
    <linearGradient id="containerTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9fefff"/>
      <stop offset="1" stop-color="#15a4db"/>
    </linearGradient>
    <linearGradient id="containerSide" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1bb9ee"/>
      <stop offset="1" stop-color="#0572a7"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#17212b" flood-opacity="0.20"/>
    </filter>
    <style>
      .label { font-family: Arial, Helvetica, sans-serif; fill: #1d2733; }
      .small { font-family: Arial, Helvetica, sans-serif; fill: #344252; }
      .mono { font-family: Consolas, "Courier New", monospace; fill: #26313d; }
      .layer-title { font-family: Arial, Helvetica, sans-serif; font-size: 22px; font-weight: 700; }
      .service-title { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; fill: #182230; }
      .service-sub { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #283646; }
      .icon { font-family: Arial, Helvetica, sans-serif; font-size: 48px; fill: #2d333b; }
      .port { font-family: Arial, Helvetica, sans-serif; font-size: 14px; font-weight: 700; fill: #1d2733; }
    </style>
  </defs>

  <rect width="1400" height="980" fill="#ffffff"/>

  <!-- Layer frames -->
  <rect x="18" y="18" width="1364" height="222" fill="url(#appBand)" stroke="#8c55aa" stroke-width="3"/>
  <rect x="18" y="253" width="1364" height="520" fill="#fbfdff" stroke="#4f8fd9" stroke-width="3"/>
  <rect x="18" y="788" width="1364" height="172" fill="url(#edgeBand)" stroke="#108a77" stroke-width="3"/>

  <!-- Brand and layer labels -->
  <g transform="translate(48 91)">
    <path d="M18 0 C8 0 0 8 0 18 C0 39 35 59 35 59 C35 59 70 39 70 18 C70 8 62 0 52 0 C44 0 38 5 35 12 C32 5 26 0 18 0 Z" fill="none" stroke="#23b8c8" stroke-width="7" stroke-linejoin="round"/>
    <circle cx="35" cy="27" r="9" fill="#23b8c8"/>
    <text x="84" y="38" class="label" font-size="39" font-weight="700" fill="#006ab6">care</text>
    <text x="168" y="38" class="label" font-size="39" font-weight="400" fill="#3186c8">plus</text>
    <text x="100" y="78" class="layer-title" fill="#a000c2">Application</text>
  </g>
  <text x="58" y="334" class="layer-title" fill="#0064c8">Back-end</text>
  <text x="58" y="881" class="layer-title" fill="#00846f">IoT</text>

  <!-- Application band -->
  <rect x="258" y="52" width="1075" height="153" rx="15" fill="#f0e3f7" stroke="#8c55aa" stroke-width="3"/>
  <g text-anchor="middle">
    <g transform="translate(380 75)">
      <text y="42" class="icon">&#9678;</text>
      <text y="78" class="service-title">Postman</text>
      <text y="101" class="service-sub">Provisionamento</text>
    </g>
    <g transform="translate(565 75)">
      <text y="42" class="icon">&#9638;</text>
      <text y="78" class="service-title">Colab Dashboard</text>
      <text y="101" class="service-sub">Python + graficos</text>
    </g>
    <g transform="translate(750 75)">
      <text y="42" class="icon">&#128187;</text>
      <text y="78" class="service-title">Admin Dashboard</text>
      <text y="101" class="service-sub">Aplicacao futura</text>
    </g>
    <g transform="translate(935 75)">
      <text y="42" class="icon">&#9881;</text>
      <text y="78" class="service-title">Gamificacao</text>
      <text y="101" class="service-sub">Missoes e pontos</text>
    </g>
    <g transform="translate(1120 75)">
      <text y="42" class="icon">&#128241;</text>
      <text y="78" class="service-title">Mobile App</text>
      <text y="101" class="service-sub">Evolucao Sprint 3</text>
    </g>
  </g>
  <rect x="138" y="190" width="79" height="28" rx="4" fill="#545454"/>
  <rect x="211" y="190" width="39" height="28" rx="4" fill="#8b22bd"/>
  <text x="178" y="210" text-anchor="middle" class="label" font-size="15" font-weight="700" fill="#fff">NGSIv2</text>
  <text x="231" y="210" text-anchor="middle" class="label" font-size="15" font-weight="700" fill="#fff">v2</text>

  <!-- Reusable docker container shape groups -->
  <g id="orion" transform="translate(292 325)" filter="url(#shadow)">
    <polygon points="0,27 112,0 178,33 62,63" fill="url(#containerTop)" stroke="#075f8d" stroke-width="2"/>
    <polygon points="62,63 178,33 178,119 62,151" fill="url(#containerSide)" stroke="#075f8d" stroke-width="2"/>
    <polygon points="0,27 62,63 62,151 0,116" fill="#58cdf4" stroke="#075f8d" stroke-width="2"/>
    <path d="M93 57 h54 v75 h-54 z M105 61 v67 M119 59 v67 M133 57 v67" fill="none" stroke="#075f8d" stroke-width="2"/>
  </g>
  <g id="iotagent" transform="translate(523 535)" filter="url(#shadow)">
    <polygon points="0,27 112,0 178,33 62,63" fill="url(#containerTop)" stroke="#075f8d" stroke-width="2"/>
    <polygon points="62,63 178,33 178,119 62,151" fill="url(#containerSide)" stroke="#075f8d" stroke-width="2"/>
    <polygon points="0,27 62,63 62,151 0,116" fill="#58cdf4" stroke="#075f8d" stroke-width="2"/>
    <path d="M93 57 h54 v75 h-54 z M105 61 v67 M119 59 v67 M133 57 v67" fill="none" stroke="#075f8d" stroke-width="2"/>
  </g>
  <g id="sth" transform="translate(754 325)" filter="url(#shadow)">
    <polygon points="0,27 112,0 178,33 62,63" fill="url(#containerTop)" stroke="#075f8d" stroke-width="2"/>
    <polygon points="62,63 178,33 178,119 62,151" fill="url(#containerSide)" stroke="#075f8d" stroke-width="2"/>
    <polygon points="0,27 62,63 62,151 0,116" fill="#58cdf4" stroke="#075f8d" stroke-width="2"/>
    <path d="M93 57 h54 v75 h-54 z M105 61 v67 M119 59 v67 M133 57 v67" fill="none" stroke="#075f8d" stroke-width="2"/>
  </g>
  <g id="broker" transform="translate(523 675)" filter="url(#shadow)">
    <polygon points="0,27 112,0 178,33 62,63" fill="url(#containerTop)" stroke="#075f8d" stroke-width="2"/>
    <polygon points="62,63 178,33 178,119 62,151" fill="url(#containerSide)" stroke="#075f8d" stroke-width="2"/>
    <polygon points="0,27 62,63 62,151 0,116" fill="#58cdf4" stroke="#075f8d" stroke-width="2"/>
    <path d="M93 57 h54 v75 h-54 z M105 61 v67 M119 59 v67 M133 57 v67" fill="none" stroke="#075f8d" stroke-width="2"/>
  </g>
  <g id="mongoInternal" transform="translate(754 535)" filter="url(#shadow)">
    <polygon points="0,27 112,0 178,33 62,63" fill="url(#containerTop)" stroke="#075f8d" stroke-width="2"/>
    <polygon points="62,63 178,33 178,119 62,151" fill="url(#containerSide)" stroke="#075f8d" stroke-width="2"/>
    <polygon points="0,27 62,63 62,151 0,116" fill="#58cdf4" stroke="#075f8d" stroke-width="2"/>
    <path d="M93 57 h54 v75 h-54 z M105 61 v67 M119 59 v67 M133 57 v67" fill="none" stroke="#075f8d" stroke-width="2"/>
  </g>

  <!-- Container labels -->
  <g text-anchor="middle">
    <text x="381" y="512" class="service-title">Orion</text>
    <text x="381" y="535" class="service-sub">Context Broker</text>
    <text x="612" y="722" class="service-title">IoT Agent MQTT</text>
    <text x="612" y="745" class="service-sub">UltraLight 2.0</text>
    <text x="843" y="512" class="service-title">STH-Comet</text>
    <text x="843" y="535" class="service-sub">Historico</text>
    <text x="612" y="862" class="service-title">MQTT Broker</text>
    <text x="612" y="885" class="service-sub">Eclipse Mosquitto</text>
    <text x="843" y="722" class="service-title">MongoDB</text>
    <text x="843" y="745" class="service-sub">IoT Agent internal</text>
  </g>

  <!-- Data layer -->
  <rect x="1148" y="377" width="178" height="318" rx="18" fill="#f7fbff" stroke="#5a91d7" stroke-width="3"/>
  <text x="1237" y="414" text-anchor="middle" class="service-title" fill="#1c62ad">Data Layer</text>
  <text x="1237" y="468" text-anchor="middle" class="icon" font-size="42">&#128274;</text>
  <text x="1237" y="516" text-anchor="middle" class="icon" font-size="42">&#127793;</text>
  <text x="1237" y="553" text-anchor="middle" class="service-title">MongoDB</text>
  <text x="1237" y="574" text-anchor="middle" class="service-sub">Historical</text>
  <text x="1237" y="632" text-anchor="middle" class="icon" font-size="42">&#128230;</text>
  <text x="1237" y="668" text-anchor="middle" class="service-title">Persistencia</text>

