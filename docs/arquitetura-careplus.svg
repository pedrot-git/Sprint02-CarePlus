  <text x="326" y="330" class="icon" font-size="28" fill="#1d68bf">&#128274;</text>
  <text x="558" y="540" class="icon" font-size="28" fill="#1d68bf">&#128274;</text>
  <text x="786" y="330" class="icon" font-size="28" fill="#1d68bf">&#9993;</text>
  <text x="563" y="686" class="icon" font-size="28" fill="#1d68bf">&#128246;</text>

  <!-- Protocol arrows between applications and backend -->
  <line x1="380" y1="205" x2="380" y2="325" stroke="#6f3c96" stroke-width="3" stroke-dasharray="4 6" marker-end="url(#arrowPurple)"/>
  <line x1="565" y1="205" x2="820" y2="325" stroke="#6f3c96" stroke-width="3" stroke-dasharray="4 6" marker-end="url(#arrowPurple)"/>
  <line x1="750" y1="205" x2="406" y2="325" stroke="#6f3c96" stroke-width="2.5" stroke-dasharray="4 6" marker-end="url(#arrowPurple)"/>
  <line x1="935" y1="205" x2="612" y2="535" stroke="#6f3c96" stroke-width="2.5" stroke-dasharray="4 6" marker-end="url(#arrowPurple)"/>
  <line x1="1120" y1="205" x2="381" y2="325" stroke="#6f3c96" stroke-width="2" stroke-dasharray="4 6" marker-end="url(#arrowPurple)"/>
  <text x="394" y="244" class="port">HTTPS / 1026</text>
  <text x="582" y="244" class="port">HTTPS / 8666</text>
  <text x="778" y="244" class="port">NGSIv2</text>

  <!-- Backend relationships -->
  <line x1="701" y1="610" x2="754" y2="610" stroke="#214f84" stroke-width="3" stroke-dasharray="4 6" marker-end="url(#arrowBlue)"/>
  <line x1="612" y1="675" x2="612" y2="686" stroke="#18784f" stroke-width="3" stroke-dasharray="9 6" marker-end="url(#arrowGreen)"/>
  <line x1="612" y1="535" x2="446" y2="445" stroke="#18784f" stroke-width="3" stroke-dasharray="9 6" marker-end="url(#arrowGreen)"/>
  <line x1="470" y1="402" x2="754" y2="402" stroke="#214f84" stroke-width="3" stroke-dasharray="4 6" marker-end="url(#arrowBlue)"/>
  <line x1="932" y1="402" x2="1148" y2="520" stroke="#3a4652" stroke-width="3" stroke-dasharray="2 10" marker-end="url(#arrowGray)"/>
  <line x1="932" y1="610" x2="1148" y2="610" stroke="#3a4652" stroke-width="2.5" stroke-dasharray="2 10" marker-end="url(#arrowGray)"/>
  <text x="626" y="392" class="port">1026</text>
  <text x="934" y="392" class="port">8666</text>
  <text x="638" y="524" class="port">4041</text>
  <text x="634" y="672" class="port">1883</text>

  <!-- Payload card -->
  <rect x="82" y="408" width="210" height="188" rx="14" fill="#ffffff" stroke="#c8d7e6" stroke-width="2"/>
  <text x="105" y="444" class="service-title">Entidade FIWARE</text>
  <text x="105" y="474" class="mono" font-size="14">CarePlusToken:</text>
  <text x="105" y="496" class="mono" font-size="14">token001</text>
  <text x="105" y="532" class="small" font-size="14">Payload MQTT:</text>
  <text x="105" y="557" class="mono" font-size="13">s|tracking|st|12</text>
  <text x="105" y="578" class="mono" font-size="13">ps|12|tp|42|b|99</text>

  <!-- Platform labels -->
  <text x="66" y="706" class="label" font-size="30" font-weight="700" fill="#2d64b2">FIWARE</text>
  <text x="190" y="706" class="label" font-size="30" font-weight="700" fill="#4b5563">docker</text>
  <text x="190" y="735" class="label" font-size="20" fill="#168dd2">Compose</text>

  <!-- Edge strip -->
  <rect x="136" y="832" width="1110" height="102" rx="16" fill="#dff2d8" stroke="#70b764" stroke-width="3"/>
  <g text-anchor="middle">
    <g transform="translate(220 855)">
      <text y="39" class="icon">&#8986;</text>
      <text y="70" class="service-title" font-size="15">Wearable</text>
      <text y="90" class="service-sub" font-size="12">CarePlus Token</text>
    </g>
    <g transform="translate(370 855)">
      <text y="39" class="icon">&#128241;</text>
      <text y="70" class="service-title" font-size="15">ESP32</text>
      <text y="90" class="service-sub" font-size="12">Wokwi</text>
    </g>
    <g transform="translate(520 855)">
      <text y="39" class="icon">&#9671;</text>
      <text y="70" class="service-title" font-size="15">MPU6050</text>
      <text y="90" class="service-sub" font-size="12">Acelerometro</text>
    </g>
    <g transform="translate(670 855)">
      <text y="39" class="icon">&#9638;</text>
      <text y="70" class="service-title" font-size="15">OLED</text>
      <text y="90" class="service-sub" font-size="12">Feedback</text>
    </g>
    <g transform="translate(820 855)">
      <text y="39" class="icon">&#9679;</text>
      <text y="70" class="service-title" font-size="15">Botao</text>
      <text y="90" class="service-sub" font-size="12">Validacao</text>
    </g>
    <g transform="translate(970 855)">
      <text y="39" class="icon">&#11044;</text>
      <text y="70" class="service-title" font-size="15">LEDs</text>
      <text y="90" class="service-sub" font-size="12">Status</text>
    </g>
    <g transform="translate(1120 855)">
      <text y="39" class="icon">&#128246;</text>
      <text y="70" class="service-title" font-size="15">Wi-Fi</text>
      <text y="90" class="service-sub" font-size="12">MQTT</text>
    </g>
  </g>
  <line x1="612" y1="832" x2="612" y2="826" stroke="#18784f" stroke-width="3"/>
  <line x1="612" y1="826" x2="612" y2="675" stroke="#18784f" stroke-width="3" stroke-dasharray="9 6" marker-end="url(#arrowGreen)"/>
  <text x="627" y="811" class="port">MQTT / 1883</text>

  <!-- Legend -->
  <g transform="translate(1038 706)">
    <line x1="0" y1="0" x2="64" y2="0" stroke="#6f3c96" stroke-width="3" stroke-dasharray="4 6" marker-end="url(#arrowPurple)"/>
    <text x="86" y="6" class="small" font-size="15" font-weight="700">NGSIv2 / HTTPS</text>
    <line x1="0" y1="36" x2="64" y2="36" stroke="#18784f" stroke-width="3" stroke-dasharray="9 6" marker-end="url(#arrowGreen)"/>
    <text x="86" y="42" class="small" font-size="15" font-weight="700">MQTT</text>
    <line x1="0" y1="72" x2="64" y2="72" stroke="#3a4652" stroke-width="3" stroke-dasharray="2 10" marker-end="url(#arrowGray)"/>
    <text x="86" y="78" class="small" font-size="15" font-weight="700">MongoDB</text>
  </g>
</svg>
