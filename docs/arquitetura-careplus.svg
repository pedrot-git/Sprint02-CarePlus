<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="960" viewBox="0 0 1000 960" role="img" aria-labelledby="title desc">
  <title id="title">Arquitetura CarePlus Sprint 02 - Preview</title>
  <desc id="desc">Arquitetura em camadas do projeto CarePlus Sprint 02 inspirada no modelo FIWARE: Application, Back-end e IoT.</desc>
  <defs>
    <marker id="arrowBlack" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#1f1f1f"/>
    </marker>
    <marker id="arrowPurple" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#7b4a98"/>
    </marker>
    <marker id="arrowGreen" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#22794f"/>
    </marker>
    <filter id="containerShadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="3" dy="8" stdDeviation="6" flood-color="#4b5563" flood-opacity="0.25"/>
    </filter>
    <linearGradient id="boxTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#92ecff"/>
      <stop offset="1" stop-color="#23b6e8"/>
    </linearGradient>
    <linearGradient id="boxFront" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#55d9ff"/>
      <stop offset="1" stop-color="#0484bd"/>
    </linearGradient>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .layer { font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: 700; fill: #101820; }
      .sub { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #111827; }
      .port { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #111827; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 11px; fill: #111827; }
      .line-icon { fill: none; stroke: #7c7c7c; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .docker-line { fill: none; stroke: #065b83; stroke-width: 1.6; }
      .protocol { fill: none; stroke: #151515; stroke-width: 2; stroke-dasharray: 2.5 4; marker-end: url(#arrowBlack); }
      .mongo { fill: none; stroke: #151515; stroke-width: 2; stroke-dasharray: 2 8; marker-end: url(#arrowBlack); }
      .mqtt { fill: none; stroke: #151515; stroke-width: 2.2; stroke-dasharray: 7 5; marker-end: url(#arrowBlack); }
    </style>

    <g id="dockerBox">
      <polygon points="0,25 112,0 165,28 52,56" fill="url(#boxTop)" stroke="#065b83" stroke-width="1.8"/>
      <polygon points="52,56 165,28 165,106 52,138" fill="url(#boxFront)" stroke="#065b83" stroke-width="1.8"/>
      <polygon points="0,25 52,56 52,138 0,108" fill="#65d8f8" stroke="#065b83" stroke-width="1.8"/>
      <path d="M78 50 h55 v69 h-55 z M89 55 v59 M102 53 v60 M116 51 v60" class="docker-line"/>
      <path d="M17 69 q22 18 50 0 q-21 37 -50 0z" fill="#0b8eca" opacity="0.65"/>
      <rect x="25" y="49" width="10" height="10" fill="#087aac" opacity="0.75"/>
      <rect x="37" y="49" width="10" height="10" fill="#087aac" opacity="0.75"/>
      <rect x="49" y="49" width="10" height="10" fill="#087aac" opacity="0.75"/>
      <rect x="37" y="37" width="10" height="10" fill="#087aac" opacity="0.75"/>
      <rect x="49" y="37" width="10" height="10" fill="#087aac" opacity="0.75"/>
    </g>
  </defs>

  <rect width="1000" height="960" fill="#fff"/>

  <!-- Main frames -->
  <rect x="16" y="16" width="968" height="205" fill="#fff" stroke="#8e57a8" stroke-width="2.4"/>
  <rect x="16" y="232" width="968" height="528" fill="#fff" stroke="#4f88c8" stroke-width="2.4"/>
  <rect x="16" y="772" width="968" height="172" fill="#fff" stroke="#00897b" stroke-width="2.4"/>

  <!-- Layer names -->
  <text x="44" y="118" class="layer" fill="#a400c7">Application</text>
  <text x="50" y="512" class="layer" fill="#0064c8">Back-end</text>
  <text x="70" y="852" class="layer" fill="#00846f">IoT</text>

  <!-- CarePlus brand -->
  <g transform="translate(42 70)">
    <path d="M16 0 C7 0 0 7 0 16 C0 34 31 51 31 51 C31 51 62 34 62 16 C62 7 55 0 46 0 C39 0 34 4 31 10 C28 4 23 0 16 0Z" fill="none" stroke="#24b8c7" stroke-width="5"/>
    <circle cx="31" cy="24" r="7" fill="#24b8c7"/>
    <text x="74" y="33" class="font" font-size="34" font-weight="700" fill="#0877bd">care</text>
    <text x="149" y="33" class="font" font-size="34" fill="#2c8cd2">plus</text>
  </g>

  <!-- Application rounded group -->
  <rect x="236" y="48" width="690" height="132" rx="12" fill="#eadcf1" opacity="0.92" stroke="#8e57a8" stroke-width="2"/>
  <g transform="translate(292 57)">
    <circle cx="27" cy="30" r="25" class="line-icon"/>
    <path d="M5 30 h44 M27 5 q17 25 0 50 M27 5 q-17 25 0 50" class="line-icon"/>
    <text x="27" y="89" text-anchor="middle" class="title">Postman</text>
    <text x="27" y="108" text-anchor="middle" class="sub">NGSIv2</text>
  </g>
  <g transform="translate(420 57)">
    <rect x="2" y="8" width="54" height="42" class="line-icon"/>
    <path d="M14 43 v-14 M28 43 v-24 M42 43 v-31 M8 56 h43" class="line-icon"/>
    <text x="29" y="89" text-anchor="middle" class="title">Dashboard Historico</text>
    <text x="29" y="108" text-anchor="middle" class="sub">Colab</text>
  </g>
  <g transform="translate(550 57)">
    <path d="M15 20 a20 20 0 1 1 30 28 M12 48 h35" class="line-icon"/>
    <path d="M24 11 v16 l13 8" class="line-icon"/>
    <text x="29" y="89" text-anchor="middle" class="title">Analytics</text>
    <text x="29" y="108" text-anchor="middle" class="sub">historico</text>
  </g>
  <g transform="translate(680 57)">
    <circle cx="29" cy="28" r="24" class="line-icon"/>
    <path d="M29 4 v12 M29 40 v12 M5 28 h12 M41 28 h12 M13 12 l8 8 M45 12 l-8 8 M13 44 l8-8 M45 44 l-8-8" class="line-icon"/>
    <text x="29" y="89" text-anchor="middle" class="title">Gamificacao</text>
    <text x="29" y="108" text-anchor="middle" class="sub">missoes</text>
  </g>
  <g transform="translate(825 57)">
    <rect x="12" y="1" width="36" height="58" rx="7" class="line-icon"/>
    <path d="M24 50 h12" class="line-icon"/>
    <text x="30" y="89" text-anchor="middle" class="title">Mobile</text>
    <text x="30" y="108" text-anchor="middle" class="sub">futuro</text>
  </g>

  <!-- NGSI tag -->
  <g transform="translate(122 190)">
    <rect x="0" y="0" width="62" height="22" rx="3" fill="#555"/>
    <rect x="58" y="0" width="38" height="22" rx="3" fill="#cf5646"/>
    <text x="31" y="15" text-anchor="middle" class="font" font-size="12" font-weight="700" fill="#fff">NGSI</text>
    <text x="77" y="15" text-anchor="middle" class="font" font-size="12" font-weight="700" fill="#fff">V2</text>
  </g>

  <!-- Backend containers -->
  <g transform="translate(365 292)" filter="url(#containerShadow)">
    <use href="#dockerBox"/>
  </g>
  <text x="448" y="470" text-anchor="middle" class="title">Orion</text>
  <text x="448" y="489" text-anchor="middle" class="sub">Context Broker</text>

  <g transform="translate(586 300)" filter="url(#containerShadow)">
    <use href="#dockerBox"/>
  </g>
  <text x="668" y="478" text-anchor="middle" class="title">STH-Comet</text>
  <text x="668" y="497" text-anchor="middle" class="sub">Historico</text>

  <g transform="translate(782 296)" filter="url(#containerShadow)">
    <use href="#dockerBox"/>
  </g>
  <text x="865" y="474" text-anchor="middle" class="title">MongoDB</text>
  <text x="865" y="493" text-anchor="middle" class="sub">Historical</text>

  <g transform="translate(365 488)" filter="url(#containerShadow)">
    <use href="#dockerBox"/>
  </g>
  <text x="448" y="666" text-anchor="middle" class="title">IoT Agent</text>
  <text x="448" y="685" text-anchor="middle" class="sub">MQTT / UltraLight</text>

  <g transform="translate(587 492)" filter="url(#containerShadow)">
    <use href="#dockerBox"/>
  </g>
  <text x="670" y="670" text-anchor="middle" class="title">MongoDB</text>
  <text x="670" y="689" text-anchor="middle" class="sub">Internal</text>

  <g transform="translate(366 630)" filter="url(#containerShadow)">
    <use href="#dockerBox"/>
  </g>
  <text x="448" y="735" text-anchor="middle" class="title">MQTT</text>
  <text x="448" y="754" text-anchor="middle" class="sub">Broker</text>
  <text x="505" y="744" class="port">1883</text>

  <!-- FIWARE / Docker labels -->
  <text x="48" y="718" class="font" font-size="25" font-weight="700" fill="#2d5fa8">FIWARE</text>
  <text x="178" y="718" class="font" font-size="25" font-weight="700" fill="#4a5568">docker</text>
  <text x="178" y="740" class="font" font-size="16" fill="#168ccf">Compose</text>
  <circle cx="156" cy="718" r="18" fill="#e9f5ff" stroke="#2d5fa8" stroke-width="2"/>
  <path d="M147 721 q10 10 22 0 M156 700 v33 M142 714 h28" fill="none" stroke="#2d5fa8" stroke-width="2"/>

  <!-- Backend icons/badges -->
  <circle cx="395" cy="274" r="14" fill="#eef8ff" stroke="#2d75b9" stroke-width="2"/>
  <path d="M389 274 h12 M395 268 v12" stroke="#2d75b9" stroke-width="3"/>
  <rect x="800" y="268" width="20" height="20" rx="2" fill="none" stroke="#1283e9" stroke-width="2"/>
  <path d="M800 271 l10 9 l10-9" fill="none" stroke="#1283e9" stroke-width="2"/>
  <path d="M880 258 c18 10 14 36-5 43 c4-17 1-31 5-43z" fill="#2ba24c"/>
  <path d="M430 610 q18-22 36 0 M437 617 q11-14 22 0 M444 624 q5-7 10 0" fill="none" stroke="#4565a8" stroke-width="3"/>
  <text x="430" y="626" class="small" fill="#4565a8">mosquitto</text>

  <!-- Application to backend protocol lines -->
  <path d="M318 180 V315 H365" class="protocol"/>
  <text x="224" y="205" class="port">1026</text>
  <path d="M448 180 V292" class="protocol"/>
  <text x="424" y="205" class="port">1026</text>
  <path d="M579 180 V300" class="protocol"/>
  <text x="555" y="205" class="port">8666</text>
  <path d="M709 180 V488 H365" class="protocol"/>
  <text x="690" y="205" class="port">4041</text>
  <path d="M855 180 V296" class="protocol"/>
  <text x="875" y="205" class="port">27017</text>

  <!-- Backend relationships -->
  <path d="M530 364 H586" class="protocol"/>
  <path d="M751 364 H782" class="mongo"/>
  <path d="M448 430 V488" class="protocol"/>
  <path d="M530 560 H587" class="mongo"/>
  <path d="M448 630 V610" class="mqtt"/>
  <path d="M448 630 V590" class="mqtt"/>
  <path d="M448 430 V488" class="protocol"/>
  <path d="M530 360 C660 430 735 430 782 360" class="mongo"/>

  <!-- Entity card -->
  <rect x="76" y="288" width="216" height="116" rx="10" fill="#fbfdff" stroke="#b9c8d8" stroke-width="2"/>
  <text x="94" y="318" class="title">CarePlusToken:token001</text>
  <text x="94" y="345" class="small">MQTT topic:</text>
  <text x="94" y="366" class="small" font-family="Consolas, monospace">/TEF/token001/attrs</text>
  <text x="94" y="390" class="small">Payload: passos, pontos, bateria, acelerometro</text>
  <path d="M292 346 H365" class="mqtt"/>

  <!-- Legend -->
  <g transform="translate(820 610)">
    <path d="M0 0 L55 0" class="protocol"/>
    <text x="82" y="5" class="small">NGSIv2</text>
    <path d="M0 36 L55 36" class="mqtt"/>
    <text x="82" y="41" class="small">MQTT</text>
    <path d="M0 72 L55 72" class="mongo"/>
    <text x="82" y="77" class="small">MongoDB</text>
  </g>

  <!-- IoT strip -->
  <rect x="136" y="818" width="790" height="70" rx="12" fill="#dff0d6" stroke="#74b66b" stroke-width="2"/>
  <g transform="translate(170 785)">
    <path d="M18 21 q17-24 34 0" fill="none" stroke="#8b8b8b" stroke-width="4"/>
    <path d="M27 30 q8-10 16 0" fill="none" stroke="#8b8b8b" stroke-width="4"/>
  </g>
  <g text-anchor="middle">
    <g transform="translate(192 824)">
      <rect x="-16" y="0" width="32" height="42" rx="9" fill="none" stroke="#777" stroke-width="4"/>
      <circle cx="0" cy="20" r="8" fill="none" stroke="#777" stroke-width="4"/>
      <text y="62" class="small">Wearable</text>
    </g>
    <g transform="translate(318 824)">
      <rect x="-24" y="5" width="48" height="34" rx="4" fill="none" stroke="#777" stroke-width="4"/>
      <path d="M-14 15 h28 M-14 26 h28" stroke="#777" stroke-width="4"/>
      <text y="62" class="small">ESP32 Wokwi</text>
    </g>
    <g transform="translate(444 824)">
      <circle cx="0" cy="22" r="22" fill="none" stroke="#777" stroke-width="4"/>
      <path d="M0 4 v18 l9 9" stroke="#777" stroke-width="4" fill="none"/>
      <text y="62" class="small">MPU6050</text>
    </g>
    <g transform="translate(570 824)">
      <rect x="-25" y="5" width="50" height="34" rx="4" fill="none" stroke="#777" stroke-width="4"/>
      <path d="M-14 16 h28 M-14 28 h18" stroke="#777" stroke-width="4"/>
      <text y="62" class="small">OLED</text>
    </g>
    <g transform="translate(696 824)">
      <circle cx="0" cy="22" r="20" fill="none" stroke="#777" stroke-width="4"/>
      <circle cx="0" cy="22" r="8" fill="#777"/>
      <text y="62" class="small">Botao</text>
    </g>
    <g transform="translate(822 824)">
      <circle cx="-10" cy="22" r="10" fill="none" stroke="#777" stroke-width="4"/>
      <circle cx="14" cy="22" r="10" fill="none" stroke="#777" stroke-width="4"/>
      <text y="62" class="small">LEDs</text>
    </g>
  </g>
  <path d="M448 818 V768" class="mqtt"/>
  <text x="464" y="790" class="port">MQTT / 1883</text>
  <text x="865" y="878" class="font" font-size="13" font-weight="700" fill="#31bbb7">FIWARE</text>
</svg>

